<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- V2 МОДЕРН: геометрия — «земля сверху, поле снизу», «З» в виде монограммы -->
  <defs>
    <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="land2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#0f3a1f"/>
    </linearGradient>
  </defs>

  <!-- Фон со сплитом 60/40 -->
  <rect width="512" height="512" rx="96" fill="url(#sky2)"/>
  <path d="M 0 320 L 512 280 L 512 512 L 0 512 Z" fill="url(#land2)"/>

  <!-- Сетка кадастровых границ — тонкая, едва заметная -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.12">
    <line x1="0" y1="380" x2="512" y2="368"/>
    <line x1="0" y1="440" x2="512" y2="430"/>
    <line x1="128" y1="320" x2="120" y2="512"/>
    <line x1="256" y1="312" x2="256" y2="512"/>
    <line x1="384" y1="304" x2="392" y2="512"/>
  </g>

  <!-- Буква «З» — sans-serif, плотная, белая -->
  <text x="256" y="340" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="340" font-weight="900" text-anchor="middle" fill="#ffffff"
        letter-spacing="-8">З</text>

  <!-- Маленький пин-маркер сверху справа от буквы -->
  <circle cx="380" cy="160" r="14" fill="#fbbf24"/>
  <circle cx="380" cy="160" r="6" fill="#ffffff"/>
</svg>
