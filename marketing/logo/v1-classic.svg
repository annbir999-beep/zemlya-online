<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- V1 КЛАССИКА: насыщенный зелёный градиент + крупная белая «З» с золотой подсветкой -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="60%" stop-color="#15803d"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
    <linearGradient id="z1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow1" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Фон — закруглённый квадрат (Telegram всё равно обрежет в круг, но смотрится лучше так) -->
  <rect width="512" height="512" rx="96" fill="url(#bg1)"/>

  <!-- Едва заметный «горизонт» — намёк на землю -->
  <path d="M 0 380 Q 256 350 512 380 L 512 512 L 0 512 Z" fill="#0d3b22" opacity="0.35"/>

  <!-- Буква «З» — массивная, выровнена оптически -->
  <text x="256" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="380"
        font-weight="700" text-anchor="middle" fill="url(#z1)" filter="url(#shadow1)">З</text>
</svg>
