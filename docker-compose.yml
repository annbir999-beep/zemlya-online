version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sotka_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sotka}
      POSTGRES_USER: ${POSTGRES_USER:-sotka}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sotka_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sotka}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sotka_redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    container_name: sotka_backend
    env_file: .env
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    extra_hosts:
      # Принудительно резолвим api.telegram.org в IPv4 — у docker-сети нет
      # IPv6-маршрутизации, AAAA-резолв даёт ENETUNREACH/timeout
      - "api.telegram.org:149.154.167.220"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: ./backend
    container_name: sotka_celery
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    extra_hosts:
      - "api.telegram.org:149.154.167.220"
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=4

  celery_beat:
    build: ./backend
    container_name: sotka_beat
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./backend:/app
    command: celery -A worker.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    container_name: sotka_frontend
    env_file: .env
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
